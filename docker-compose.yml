services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: inspoclip
      POSTGRES_PASSWORD: inspoclip
      POSTGRES_DB: inspoclip
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U inspoclip']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  server:
    build: ./server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://inspoclip:inspoclip@postgres:5432/inspoclip
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_API_KEY: ${AI_API_KEY:-sk-placeholder}
      AI_API_BASE: ${AI_API_BASE:-https://api.openai.com/v1}
      AI_MODEL: ${AI_MODEL:-gpt-5.4-codex}
      PORT: 3001
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '127.0.0.1:3001:3001'
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(\"http://localhost:3001/api/health\").then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - '${PORT:-8080}:80'

volumes:
  pgdata:
  uploads:
