  <path d="M20 12.5 18 19M28 11.5l-2 7M36 10.5l-2 7M44 9.5l-2 7" stroke="#fff6e9" stroke-width="1.2" opacity="0.45"/>

  <path d="M42 21.5 44.4 27l5.8 2-5.8 2-2.4 5.5-2.4-5.5-5.8-2 5.8-2z" fill="#fffbe6" stroke="#c0784a" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="23" cy="24" r="2.4" fill="#fdf7ef" opacity="0.9"/>
  <circle cx="31" cy="34" r="1.6" fill="#4a3028" opacity="0.35"/>
