    <path d="M20.5 20.5 45 18l2.2 20.2-24.5 2.7z" fill="url(#photo)" stroke="#fdf7ef" stroke-width="4"/>
    <path d="M24 45.5c4.5-1.7 11.5-2.5 19-2.2" fill="none" stroke="#c0784a" stroke-width="3" stroke-linecap="round"/>
  </g>

