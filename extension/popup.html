<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo-row">
        <img src="icons/icon48.png" alt="Logo" class="logo" />
        <div>
          <h1>InspoClip</h1>
          <p class="subtitle" data-i18n="subtitle">Design Inspiration Saver</p>
        </div>
      </div>
      <div class="header-actions">
        <div class="connection-status" id="connectionStatus" title="Click to test">
          <span class="dot"></span>
          <span class="label" id="connectionLabel"></span>
        </div>
        <button class="icon-btn" id="langToggle" title="Switch language">
          <span id="langLabel">中</span>
        </button>
      </div>
    </div>

    <!-- Status message -->
    <div class="status" id="status"></div>

    <!-- Main actions -->
    <div class="actions">
      <button id="analyzeBtn" class="btn btn-primary">
        <span class="btn-icon">🔍</span>
        <span data-i18n="analyzePage">Analyze Page</span>
      </button>
      <button id="captureBtn" class="btn btn-secondary">
        <span class="btn-icon">📸</span>
        <span data-i18n="quickSave">Quick Save</span>
      </button>
    </div>

    <!-- Screenshot actions -->
    <div class="actions actions-secondary">
      <button id="areaAnalyzeBtn" class="btn btn-ghost">
        <span class="btn-icon">✂️</span>
        <span data-i18n="areaAnalyze">Area Analyze</span>
      </button>
      <button id="areaSaveBtn" class="btn btn-ghost">
        <span class="btn-icon">✂️</span>
        <span data-i18n="areaSave">Area Save</span>
      </button>
    </div>

    <!-- Settings (collapsed by default) -->
    <div class="settings-section">
      <button class="settings-toggle" id="settingsToggle">
        <span class="settings-arrow" id="settingsArrow">▸</span>
        <span data-i18n="settings">Settings</span>
      </button>
      <div class="settings-body-wrapper" id="settingsWrapper">
        <div class="settings-body">
          <label for="serverUrl">Server URL</label>
          <div class="input-row">
            <input type="text" id="serverUrl" placeholder="http://localhost:3001" />
            <button id="testConnection" class="btn btn-small" data-i18n="test">Test</button>
          </div>
          <label for="appUrl">Frontend URL</label>
          <div class="input-row">
            <input type="text" id="appUrl" placeholder="http://localhost:8080" />
          </div>
          <button id="saveSettings" class="btn btn-small btn-full" data-i18n="saveSettings">Save Settings</button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <a href="#" id="openApp" data-i18n="openInspoClip">Open InspoClip →</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
