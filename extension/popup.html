<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo-row">
        <img src="icons/icon48.png" alt="Logo" class="logo" />
        <div>
          <h1>InspoClip</h1>
          <p class="subtitle" data-i18n="subtitle">Design Inspiration Saver</p>
        </div>
      </div>
      <div class="header-actions">
        <div class="connection-status" id="connectionStatus" title="Click to test">
          <span class="dot"></span>
          <span class="label" id="connectionLabel"></span>
        </div>
        <button class="icon-btn" id="langToggle" title="Switch language">
          <span id="langLabel">中</span>
        </button>
      </div>
    </div>

    <!-- Status message -->
    <div class="status" id="status"></div>

    <!-- Main actions -->
    <div class="actions">
      <button id="analyzeBtn" class="btn btn-primary">
        <span class="btn-icon">🔍</span>
        <span data-i18n="analyzePage">Analyze Page</span>
      </button>
      <button id="captureBtn" class="btn btn-secondary">
        <span class="btn-icon">📸</span>
        <span data-i18n="quickSave">Quick Save</span>
      </button>
    </div>

    <!-- Analysis results (hidden by default) -->
    <div class="analysis-panel" id="analysisPanel" style="display: none;">
      <div class="analysis-header">
        <h3 data-i18n="analysisResult">Analysis Result</h3>
        <button id="closeAnalysis" class="icon-btn">✕</button>
      </div>

      <!-- Preview -->
      <div class="preview-container">
        <img id="previewImage" alt="Preview" />
      </div>

      <!-- Terms -->
      <div class="section">
        <div class="section-header">
          <h4 data-i18n="designTerms">Design Terms</h4>
          <button class="icon-btn copy-section-btn" data-copy="terms" title="Copy all">
            <span>📋</span>
          </button>
        </div>
        <div class="terms-list" id="termsList"></div>
      </div>

      <!-- Colors -->
      <div class="section">
        <div class="section-header">
          <h4 data-i18n="colorPalette">Color Palette</h4>
          <button class="icon-btn copy-section-btn" data-copy="colors" title="Copy all">
            <span>📋</span>
          </button>
        </div>
        <div class="colors-list" id="colorsList"></div>
      </div>

      <!-- Prompt -->
      <div class="section">
        <div class="section-header">
          <h4>AI Prompt</h4>
          <div class="prompt-controls">
            <div class="lang-toggle-group" id="promptLangGroup">
              <button class="lang-btn active" data-lang="auto">Auto</button>
              <button class="lang-btn" data-lang="en">EN</button>
              <button class="lang-btn" data-lang="zh">中</button>
              <button class="lang-btn" data-lang="both">EN/中</button>
            </div>
            <button class="icon-btn copy-section-btn" data-copy="prompt" title="Copy">
              <span>📋</span>
            </button>
          </div>
        </div>
        <div class="prompt-text" id="promptText"></div>
      </div>

      <!-- Upload button -->
      <button id="uploadAnalyzed" class="btn btn-primary btn-full">
        <span class="btn-icon">⬆️</span>
        <span data-i18n="saveToInspoClip">Save to InspoClip</span>
      </button>
    </div>

    <!-- Settings (collapsed by default) -->
    <details class="settings-section">
      <summary data-i18n="settings">Settings</summary>
      <div class="settings-body">
        <label for="serverUrl">Server URL</label>
        <div class="input-row">
          <input type="text" id="serverUrl" placeholder="http://localhost:3001" />
          <button id="testConnection" class="btn btn-small" data-i18n="test">Test</button>
        </div>
        <label for="appUrl">Frontend URL</label>
        <div class="input-row">
          <input type="text" id="appUrl" placeholder="http://localhost:8080" />
        </div>
        <button id="saveSettings" class="btn btn-small btn-full" data-i18n="saveSettings">Save Settings</button>
      </div>
    </details>

    <!-- Footer -->
    <div class="footer">
      <a href="#" id="openApp" data-i18n="openInspoClip">Open InspoClip →</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
